<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="enter city name " spellcheck="false" id="location">
            <button onclick="checkWeather();"><img src="search.png" alt=""></button>
        </div>
        <div class="error"><p></p></div>
        <div class="weather">
            <img id = "weather-img"src="rain.png" alt="" class="weather-icon">
            <h1 id="temp">22°C</h1>
            <h2 class="city", id="name">New Delhi</h2>
            <div class="details">
                <div class="col">
                    <img  src="humidity.png" alt="">
                    <div>
                        <p id="humid" class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                    
                </div>
                <div class="col">
                    <div>
                        <p class="weather2" id="weather">Clear Sky</p>
                        
                    </div>
                </div>
            <div class="col">
                <img src="wind.png" alt="">
                <div>
                    <p id="windspeed" class="wind">15 km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>

        </div>
    </div>

    <script>
        const apiKey = "61aba658a0414e395b1dafd04a7e286b";
        const apiUrl ="https://api.openweathermap.org/data/2.5/weather?units=metric";       
       

        async function checkWeather() {
        const wlocation = document.getElementById("location").value;
        try {
            
        const response = await fetch(`${apiUrl}&q=${wlocation}&appid=${apiKey}`);
        
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        
        
        document.getElementById("name").innerHTML=`${data.name}`;
        document.getElementById("temp").innerHTML=`${data.main.temp}°C`;
        document.getElementById("weather").innerHTML=`${data.weather[0].description}`;
        document.getElementById("windspeed").innerHTML=`${data.wind.speed} km/h`;
        document.getElementById("humid").innerHTML=`${data.main.humidity} %`;

        const weather = data.weather[0].description;
        let weatherImg = document.getElementById("weather-img");
        if(weather==="clear sky"){
            weatherImg.setAttribute("src","clear.png");
        }else if(weather==="overcast clouds"){
            weatherImg.setAttribute("src","clouds.png");
        }else if(weather==="few clouds"){
            weatherImg.setAttribute("src","drizzle.png");
        }else if(weather==="rain"){
            weatherImg.setAttribute("src","rain.png");
        }else if(weather==="snow"){
            weatherImg.setAttribute("src","snow.png");
        }


    
    } catch (error) {
        console.error("Failed to fetch weather data:", error);
    }
}



    //checkWeather();
    </script>
    
</body>
</html>
